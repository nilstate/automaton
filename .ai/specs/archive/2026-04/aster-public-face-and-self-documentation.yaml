status: "completed"

task:
  title: "Define aster public face and self-documentation surfaces"
  summary: >
    Plan the separate aster.runx.ai site and the self-documentation system
    that feeds it. The target face is site/. Working docs may remain in the
    repo, but Sourcey is not part of the intended public architecture. The site
    belongs to aster, pulls only selected generic live data from runx, and
    must never masquerade derived operator narrative as canonical receipts.
  size: "medium"
  risk_level: "medium"
  context:
    packages:
      - "docs"
      - ".artifacts"
      - "site"
      - "doctrine"
      - "state"
      - "history"
      - "reflections"
      - "../runx/docs"
    related_docs:
      - "docs/architecture.md"
      - "docs/introduction.md"
      - "docs/operating-model.md"
      - "../runx/docs/public-website-data.md"
    invariants:
      - "aster_site_is_separate"
      - "runx_receipts_remain_canonical"
      - "public_narrative_never_overclaims"
  objectives:
    - "Define the route surface for aster.runx.ai."
    - "Define which repo-owned content categories feed the site."
    - "Define the migration from docs/ plus Sourcey to site/."
    - "Define which live data is linked from runx rather than copied."
    - "Define append-only self-documentation rules."
    - "Define the route contract and rendering contract for the public site."
  touchpoints:
    - area: "site"
      description: "Separate aster public face."
    - area: "repo content"
      description: "Doctrine, state, history, reflections, and the current docs shape."
    - area: "receipt links"
      description: "Canonical receipts stay on runx surfaces."
  scope:
    in_scope:
      - "Site route plan"
      - "Repo content ownership"
      - "Working-docs to site migration"
      - "Public narrative policy"
      - "Self-documentation update rules"
    out_of_scope:
      - "Implementing Astro components"
      - "Deploying the site"
      - "Design system implementation"
  dependencies:
    - "aster-operator-architecture"
  acceptance:
    validation_profile: "standard"
    definition_of_done:
      - id: "dod1"
        description: "The architecture plan names the separate public face and its content sources."
        status: "done"
        checked_at: "2026-04-20T10:37:32Z"
      - id: "dod2"
        description: "The plan distinguishes canonical receipts from public narrative."
        status: "done"
        checked_at: "2026-04-20T10:37:32Z"
      - id: "dod3"
        description: "The target repo shape for doctrine, state, history, reflections, and site is documented."
        status: "done"
        checked_at: "2026-04-20T10:37:32Z"
      - id: "dod4"
        description: "The spec explains that working docs may remain, but site/ is the intended public face."
        status: "done"
        checked_at: "2026-04-20T10:37:32Z"
      - id: "dod5"
        description: "The spec defines the stable public route contract and rendering sources."
        status: "done"
        checked_at: "2026-04-20T10:37:32Z"
    validation:
      - id: "v1"
        type: "documentation"
        description: "Architecture page contains public face, route contract, working-docs migration, and repo shape sections."
        command: "rg -n \"Public Face|Sourcey is optional tooling|site/ is the intended public face|Site Information Architecture|Repo Shape|aster.runx.ai|doctrine/|state/|history/|reflections/|site/\" docs/architecture.md"
        expected: "site and repo shape sections present"
      - id: "v2"
        type: "documentation"
        description: "Introduction and README expose the architecture plan."
        command: "rg -n \"architecture\" README.md docs/introduction.md docs/sourcey.config.ts"
        expected: "architecture is linked from repo entry points"

