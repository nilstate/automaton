phases:
  - id: "phase1"
    name: "Site Boundary"
    objective: "Define why aster.runx.ai is separate and what it links back to on runx."
    changes:
      - file: "docs/architecture.md"
        action: "update"
        content_spec: |
          Add the public face section describing the separate site, the current
          working-docs surface, the target site/ face, and the rule that
          canonical receipts remain on runx surfaces.
    acceptance_criteria:
      - id: "ac1_1"
        type: "documentation"
        description: "Public face and migration section is present."
        command: "rg -n \"Public Face|site/ is the intended public face|Sourcey is optional tooling\" docs/architecture.md"
        expected: "public face boundary present"
        result:
          status: "pass"
          timestamp: "2026-04-20T10:36:42Z"
          output: "100:## Public Face 128:- `site/` is the intended public face 129:- Sourcey is optional tooling, not part of the 10/10 architecture"
    summary: "Verified the separate public face, working-docs migration, and Sourcey-is-optional boundary."
    status: "completed"
  - id: "phase2"
    name: "Self-Documentation Sources"
    objective: "Define which repo-owned materials feed the site."
    dependencies: ["phase1"]
    changes:
      - file: "docs/architecture.md"
        action: "update"
        content_spec: |
          Add the repo shape and explain what doctrine, state, history,
          reflections, site, docs, and .artifacts mean.
    acceptance_criteria:
      - id: "ac2_1"
        type: "documentation"
        description: "Repo shape section is present."
        command: "rg -n \"Repo Shape|doctrine/|state/|history/|reflections/|site/|\\.artifacts/|docs/\" docs/architecture.md"
        expected: "repo shape section present"
        result:
          status: "pass"
          timestamp: "2026-04-20T10:36:42Z"
          output: "153:## Repo Shape 159:  doctrine/ 160:  state/ 162:  history/ 163:  reflections/ 164:  site/ 167:  .artifacts/ 168:  docs/"
    summary: "Verified the target repo shape and ownership descriptions for doctrine, state, history, reflections, site, docs, and artifacts."
    status: "completed"
  - id: "phase3"
    name: "Narrative Policy"
    objective: "Define what counts as canonical proof versus public narrative."
    dependencies: ["phase1"]
    changes:
      - file: "docs/architecture.md"
        action: "update"
        content_spec: |
          Add the canonical-vs-derived-vs-public table and the rule that
          derived narrative links back to receipts instead of replacing them.
    acceptance_criteria:
      - id: "ac3_1"
        type: "documentation"
        description: "Canonical-vs-public rules are present."
        command: "rg -n \"Canonical, Derived, Public|Canonical receipts and generic run evidence\" docs/architecture.md"
        expected: "narrative policy present"
        result:
          status: "pass"
          timestamp: "2026-04-20T10:36:42Z"
          output: "119:Canonical receipts and generic run evidence should still resolve through `runx` surfaces. 231:## Canonical, Derived, Public"
    summary: "Verified the canonical-receipt versus public-narrative boundary and the rule that narrative links back to receipts."
    status: "completed"
  - id: "phase4"
    name: "Route And Rendering Contract"
    objective: "Define the stable public route contract and what each page is allowed to render from."
    dependencies: ["phase1"]
    changes:
      - file: "docs/architecture.md"
        action: "update"
        content_spec: |
          Add a site information architecture section with routes, allowed
          content sources, and receipt/snapshot linkage rules.
    acceptance_criteria:
      - id: "ac4_1"
        type: "documentation"
        description: "Site information architecture is present."
        command: "rg -n \"Site Information Architecture|/priorities|/history|/capabilities|/reflections|/targets/\\[slug\\]\" docs/architecture.md"
        expected: "site route contract present"
        result:
          status: "pass"
          timestamp: "2026-04-20T10:36:42Z"
          output: "691:## Site Information Architecture 698:- `/priorities` — live priorities and rationale from `state/` 699:- `/history` — append-only public history 700:- `/capabilities` — current lanes, trust posture, and capability inventory 701:- `/reflections` — selected public reflections 702:- `/targets/[slug]` — public target context where appropriate"
    summary: "Verified the stable public route contract and rendering sources for the aster.runx.ai site."
    status: "completed"

