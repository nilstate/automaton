task:
  title: "Dogfood cycle 6: harness catalog sweep"
  summary: >
    Cycle 6 closes the first dogfood campaign round by sweeping the
    remaining 14 runx skills at once: verifying each harness still
    passes and recording per-skill coverage counts in docs/dogfood.md.
    Instead of editing every skill in a single cycle, cycle 6
    produces a measured audit table that identifies the systemic
    under-coverage pattern (8 of 14 surveyed skills have only one
    harness case) and queues a follow-up round to add negative /
    edge-case coverage. The audit itself IS the meaningful
    contribution.
  size: "medium"
  risk_level: "low"
  context:
    packages:
      - "../runx/oss/skills"
      - ".artifacts/dogfood-cycles"
      - "docs"
    files_impacted:
      - path: ".artifacts/dogfood-cycles/dogfood-cycle-6-catalog-sweep/"
        lines: "all"
        reason: "Evidence bundle."
      - path: "docs/dogfood.md"
        lines: "as-needed"
        reason: "Catalog status flip + audit table + cycle log row + pressure rows + campaign-round-close note."
    invariants:
      - "bounded_improvement_per_cycle"
      - "no_cycle_is_a_no_op"
    related_docs:
      - "docs/dogfood.md"
    cwd: "/home/kam/dev/aster"
  objectives:
    - "Run `runx harness` across the 14 remaining catalog skills."
    - "Record per-skill harness status and case count in docs/dogfood.md."
    - "Flip verified skills to a `surveyed` status in the catalog."
    - "Surface the systemic 1-case pattern as a follow-up campaign round."
  scope:
    in_scope:
      - "Running harness across all catalog skills."
      - "Updating docs/dogfood.md with the audit table."
    out_of_scope:
      - "Editing individual skill X.yaml harness blocks (deferred to a follow-up round)."
      - "Runx kernel changes."
  dependencies:
    - "runx harness working (already true)."
  assumptions:
    - "All remaining skills currently have at least one harness case."
  touchpoints:
    - area: "audit"
      description: "Per-skill harness verification."
      owners: ["aster", "runx"]
    - area: "campaign"
      description: "docs/dogfood.md round-1 close note."
      owners: ["aster"]
  risks:
    - description: "Audit finds a skill whose harness silently fails."
      impact: "medium"
      mitigation: "Record the failure, open a follow-up draft, move on."
  acceptance:
    validation_profile: "standard"
    definition_of_done:
      - id: "dod1"
        description: "Per-skill harness status recorded in docs/dogfood.md."
        status: "pending"
      - id: "dod2"
        description: "Surveyed skills flipped in the catalog."
        status: "pending"
      - id: "dod3"
        description: "Cycle evidence bundle complete."
        status: "pending"
      - id: "dod4"
        description: "Round-1 close note appended to docs/dogfood.md."
        status: "pending"
    validation:
      - id: "v1"
        type: "boundary"
        description: "Cycle evidence folder has six required files."
        command: "bash -c 'd=.artifacts/dogfood-cycles/dogfood-cycle-6-catalog-sweep; for f in objective.md receipt.json diagnosis.json improvement.md patch.diff cycle_metadata.json; do [ -s \"$d/$f\" ] || { echo missing $f; exit 1; }; done; echo ok'"
        expected: "ok"
      - id: "v2"
        type: "documentation"
        description: "docs/dogfood.md has the catalog audit table."
        command: "bash -c 'grep -q \"Catalog audit\" docs/dogfood.md && echo ok || echo fail'"
        expected: "ok"
      - id: "v3"
        type: "documentation"
        description: "docs/dogfood.md references cycle 6."
        command: "bash -c 'n=$(grep -c dogfood-cycle-6-catalog-sweep docs/dogfood.md); [ \"$n\" -ge 2 ] && echo ok || echo fail'"
        expected: "ok"
  constraints:
    approvals_required: []
    non_goals:
      - "No per-skill harness edits"
      - "No kernel changes"

