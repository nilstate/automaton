task:
  title: "Dogfood cycle 8: extend issue-to-pr harness through author-spec"
  summary: >
    Cycle 7 was closed as no_improvement_found because extending the
    issue-to-pr harness appeared to be blocked by a task_id
    propagation bug. Further investigation during cycle-7 follow-up
    confirmed that runx DOES auto-propagate chain inputs to step
    inputs by name; the original scafld-new failure was purely the
    missing `.ai/` workspace in harness isolation, and spec A already
    fixed that. So with spec A landed, the chain now reaches
    author-spec and yields a cognitive-work request.

    Cycle 8 adds a second harness case that provides canned
    `caller.answers` for `agent_step.issue-to-pr-author-spec.output`
    so the harness can exercise the chain deeper than scafld-new.
    The existing smoke case stays as the shallow baseline.
  size: "medium"
  risk_level: "low"
  context:
    packages:
      - "../runx/oss/skills/issue-to-pr"
      - ".artifacts/dogfood-cycles"
      - "docs"
    files_impacted:
      - path: "../runx/oss/skills/issue-to-pr/X.yaml"
        lines: "as-needed"
        reason: "Add a second harness case with canned author-spec caller.answers."
      - path: ".artifacts/dogfood-cycles/dogfood-cycle-8-issue-to-pr-author-spec/"
        lines: "all"
        reason: "Evidence bundle."
      - path: "docs/dogfood.md"
        lines: "as-needed"
        reason: "Cycle log + pressure rows."
    invariants:
      - "bounded_improvement_per_cycle"
      - "no_cycle_is_a_no_op"
    cwd: "/home/kam/dev/aster"
  objectives:
    - "Add a second harness case providing canned author-spec caller.answers."
    - "Lock in that the chain reaches author-spec after spec A landed."
    - "Confirm both harness cases pass."
    - "Record in docs/dogfood.md."
  scope:
    in_scope:
      - "Editing issue-to-pr X.yaml harness only."
      - "Updating docs/dogfood.md."
    out_of_scope:
      - "Further chain coverage past author-spec."
      - "Kernel changes."
  dependencies:
    - "Spec A landed (scafld-init prelude + scafld 1.4.1 auto-init)."
  assumptions:
    - "Runx harness accepts caller.answers for a chain fixture."
    - "A minimal stub spec_draft/spec_contents pair is enough to let the chain progress."
  touchpoints:
    - area: "issue-to-pr harness"
      description: "One additional case exercising the author-spec hand-off."
      owners: ["runx"]
  risks:
    - description: "Stubbed spec_contents fails the chain's next step (write-spec or scafld-validate) because it is not a real scafld spec."
      impact: "medium"
      mitigation: "Accept whatever downstream status the chain produces; lock it in via expect.status. The point is to exercise past author-spec, not to run the full lifecycle."
  acceptance:
    validation_profile: "standard"
    definition_of_done:
      - id: "dod1"
        description: "Second harness case landed with author-spec caller.answers."
        status: "pending"
      - id: "dod2"
        description: "Both cases present and harness overall reports success."
        status: "pending"
      - id: "dod3"
        description: "Evidence bundle complete."
        status: "pending"
      - id: "dod4"
        description: "docs/dogfood.md updated."
        status: "pending"
    validation:
      - id: "v1"
        type: "test"
        description: "Harness passes with 2 cases."
        command: "bash -c 'cd ../runx && runx harness oss/skills/issue-to-pr --json > /tmp/itp.json && st=$(jq -r .status /tmp/itp.json); n=$(jq \"[.cases[] | .fixture.name] | length\" /tmp/itp.json); [ \"$st\" = success ] && [ \"$n\" -ge 2 ] && echo ok || echo fail'"
        expected: "ok"
      - id: "v2"
        type: "documentation"
        description: "docs/dogfood.md references cycle 8."
        command: "bash -c 'n=$(grep -c dogfood-cycle-8-issue-to-pr-author-spec docs/dogfood.md); [ \"$n\" -ge 2 ] && echo ok || echo fail'"
        expected: "ok"
  constraints:
    approvals_required: []
    non_goals:
      - "No full chain coverage"

