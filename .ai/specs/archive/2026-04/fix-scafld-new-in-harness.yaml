task:
  title: "Make scafld new tolerate a bare cwd in runx harness"
  summary: >
    Cycle 5 surfaced that issue-to-pr's first step (scafld-new)
    fails when the chain runs inside the runx harness sandbox
    because the sandbox cwd is not a scafld workspace. The fix is
    to prepend a `scafld init` step to the issue-to-pr chain;
    scafld init is idempotent, so the step is a no-op in real
    repos where the workspace already exists. After the fix,
    cycle-5's harness case can expect `status: needs_resolution`
    (caller cognitive-work hand-off) rather than locking in
    `status: failure`.
  size: "small"
  risk_level: "low"
  context:
    packages:
      - "../runx/oss/skills/issue-to-pr"
    files_impacted:
      - path: "../runx/oss/skills/issue-to-pr/X.yaml"
        lines: "as-needed"
        reason: "Prepend scafld-init step; update cycle-5 harness expectation."
    invariants:
      - "bounded_improvement_per_cycle"
    cwd: "/home/kam/dev/aster"
  objectives:
    - "Prepend a scafld-init step to issue-to-pr's chain."
    - "Update the cycle-5 harness case to expect `status: needs_resolution`."
    - "Confirm `runx harness oss/skills/issue-to-pr` still passes."
  scope:
    in_scope:
      - "Editing issue-to-pr X.yaml."
    out_of_scope:
      - "Changes to the scafld CLI itself."
      - "Changes to runx harness sandbox setup."
      - "Edits to other skills."
  dependencies:
    - "Runx harness runs `scafld init` successfully when invoked from the scafld skill wrapper."
  assumptions:
    - "scafld init is idempotent (verified manually)."
    - "The scafld skill wrapper in runx accepts `command: init`."
  touchpoints:
    - area: "issue-to-pr"
      description: "One new chain step, one fixture update."
      owners: ["runx"]
  risks:
    - description: "scafld init inside the harness produces side effects that pollute the sandbox."
      impact: "low"
      mitigation: "The sandbox is torn down after each harness run."
  acceptance:
    validation_profile: "standard"
    definition_of_done:
      - id: "dod1"
        description: "scafld-init step added before scafld-new."
        status: "pending"
      - id: "dod2"
        description: "Harness case expects status: needs_resolution."
        status: "pending"
      - id: "dod3"
        description: "Harness passes."
        status: "pending"
    validation:
      - id: "v1"
        type: "test"
        description: "issue-to-pr harness still passes."
        command: "bash -c 'cd ../runx && runx harness oss/skills/issue-to-pr --json > /tmp/itp-harness.json && s=$(jq -r .status /tmp/itp-harness.json); [ \"$s\" = success ] && echo ok || echo fail'"
        expected: "ok"
      - id: "v2"
        type: "boundary"
        description: "scafld-init step is present in the chain."
        command: "bash -c 'grep -q \"id: scafld-init\" ../runx/oss/skills/issue-to-pr/X.yaml && echo ok || echo fail'"
        expected: "ok"
  constraints:
    approvals_required: []
    non_goals:
      - "No scafld CLI changes"

