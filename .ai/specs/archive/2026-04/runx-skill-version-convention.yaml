phases:
  - id: "phase1"
    name: "Pilot on one skill"
    objective: "Add version: 0.1.0 to improve-skill/X.yaml and confirm the harness still passes."
    changes:
      - file: "../runx/oss/skills/improve-skill/X.yaml"
        action: "update"
        lines: "top"
        content_spec: |
          Add `version: "0.1.0"` as a top-level field.
    acceptance_criteria:
      - id: "ac1_1"
        type: "test"
        description: "improve-skill harness passes with the new field."
        command: "bash -c 'cd ../runx && runx harness oss/skills/improve-skill --json > /tmp/is-harness.json && s=$(jq -r .status /tmp/is-harness.json); [ \"$s\" = success ] && echo ok || echo fail'"
        expected: "ok"
        result: "pass"
        executed_at: "2026-04-20T13:43:57Z"
        result_output: "ok"
    status: "pending"

  - id: "phase2"
    name: "Sweep remaining skills"
    objective: "Add the version field to every other skill's X.yaml."
    dependencies: ["phase1"]
    changes:
      - file: "../runx/oss/skills/*/X.yaml"
        action: "update"
        lines: "top"
        content_spec: |
          Add `version: "0.1.0"` as a top-level field in every remaining skill.
    acceptance_criteria:
      - id: "ac2_1"
        type: "test"
        description: "Every skill has the version field."
        command: "bash -c 'cd ../runx/oss/skills && missing=0; for d in */; do [ -f \"$d/X.yaml\" ] || continue; grep -q \"^version:\" \"$d/X.yaml\" || { echo missing: $d; missing=1; }; done; [ $missing -eq 0 ] && echo ok || echo fail'"
        expected: "ok"
        result: "pass"
        executed_at: "2026-04-20T13:43:57Z"
        result_output: "ok"
    status: "pending"

  - id: "phase3"
    name: "Document the convention"
    objective: "Author runx/oss/skills/VERSIONING.md."
    dependencies: ["phase2"]
    changes:
      - file: "../runx/oss/skills/VERSIONING.md"
        action: "create"
        lines: "all"
        content_spec: |
          Document: default 0.1.0 for new skills; bump patch on SKILL.md prompt tweaks or harness additions; bump minor on runner or output contract changes; bump major on chain redefinition.
    acceptance_criteria:
      - id: "ac3_1"
        type: "test"
        description: "VERSIONING.md exists."
        command: "bash -c '[ -f ../runx/oss/skills/VERSIONING.md ] && echo ok || echo fail'"
        expected: "ok"
        result: "pass"
        executed_at: "2026-04-20T13:43:57Z"
        result_output: "ok"
    status: "pending"

rollback:
  strategy: "per_phase"
  commands:
    phase1: "git -C ../runx/oss checkout HEAD -- skills/improve-skill/X.yaml"
    phase2: "git -C ../runx/oss checkout HEAD -- skills/"
    phase3: "rm -f ../runx/oss/skills/VERSIONING.md"

