phases:
  - id: "phase1"
    name: "Spec And Contracts"
    objective: "Define the cutover contract, new thread-teaching artifacts, and training schemas."
    changes:
      - file: ".ai/specs/active/aster-thread-teaching-cutover.yaml"
        action: "create"
        lines: "all"
        content_spec: |
          Add the executing hard-cutover spec with detailed objectives,
          touchpoints, phases, validations, and no-compat constraints.
      - file: "spec/thread-teaching-row.schema.json"
        action: "create"
        lines: "all"
        content_spec: |
          Create the canonical schema for one issue-derived teaching row.
      - file: "scripts/runx-control-schemas.mjs"
        action: "update"
        lines: "all"
        content_spec: |
          Register the new thread-teaching-row schema alongside the existing
          selector and control schemas.
    acceptance_criteria:
      - id: "ac1_1"
        type: "boundary"
        description: "The new training-row schema parses."
        command: "python3 -c \"import json; json.load(open('spec/thread-teaching-row.schema.json')); print('ok')\""
        expected: "ok"
    status: "completed"
  - id: "phase2"
    name: "Thread Teaching Derivation"
    objective: "Replace approval-only parsers and state with a generic thread-teaching derivation pipeline."
    dependencies: ["phase1"]
    changes:
      - file: "scripts/thread-teaching.mjs"
        action: "create"
        lines: "all"
        content_spec: |
          Add the canonical marker grammar, thread loaders, record parsers,
          matchers, and training-row helpers for thread teaching.
      - file: "scripts/derive-thread-teaching-context.mjs"
        action: "create"
        lines: "all"
        content_spec: |
          Derive active thread-scoped thread teaching for one issue or PR.
      - file: "scripts/derive-thread-teaching.mjs"
        action: "create"
        lines: "all"
        content_spec: |
          Build repo-owned state/thread-teaching.json and thread-teaching rows from
          trusted issue and PR thread records.
      - file: "state/thread-teaching.json"
        action: "create"
        lines: "all"
        content_spec: |
          Replace state/approved-policies.json with the new thread-teaching state file.
      - file: "scripts/derive-approval-context.mjs"
        action: "delete"
        lines: "all"
        content_spec: "Remove the approval-only thread parser."
      - file: "scripts/derive-approved-policies.mjs"
        action: "delete"
        lines: "all"
        content_spec: "Remove the approval-only derived-state builder."
      - file: "state/approved-policies.json"
        action: "delete"
        lines: "all"
        content_spec: "Remove the approval-only state file."
    acceptance_criteria:
      - id: "ac2_1"
        type: "test"
        description: "Thread-teaching parser and derivation tests pass."
        command: "node --test scripts/thread-teaching.test.mjs scripts/derive-thread-teaching-context.test.mjs scripts/derive-thread-teaching.test.mjs"
        expected: "exit code 0"
    status: "completed"
  - id: "phase3"
    name: "Runtime Cutover"
    objective: "Feed thread teaching through context assembly, gate resolution, promotions, and selector memory."
    dependencies: ["phase2"]
    changes:
      - file: "scripts/build-aster-context.mjs"
        action: "update"
        lines: "all"
        content_spec: |
          Replace approval-context inputs with active thread-teaching context and
          derived thread-teaching matches.
      - file: "scripts/aster-core.mjs"
        action: "update"
        lines: "all"
        content_spec: |
          Write thread-teaching context and gate-decision artifacts instead of
          approval-context files.
      - file: "scripts/runx-agent-bridge.mjs"
        action: "update"
        lines: "all"
        content_spec: |
          Resolve runx approval requests from thread-teaching gate authorizations
          and emit gate-decision records.
      - file: "scripts/promote-aster-state.mjs"
        action: "update"
        lines: "all"
        content_spec: |
          Record thread-teaching context and gate decisions in promotion packets.
      - file: "scripts/aster-cycle.mjs"
        action: "update"
        lines: "all"
        content_spec: |
          Load issue-derived teaching memory into operator memory lookups.
    acceptance_criteria:
      - id: "ac3_1"
        type: "test"
        description: "Updated runtime and selector tests pass."
        command: "node --test scripts/build-aster-context.test.mjs scripts/runx-agent-bridge.test.mjs scripts/promote-aster-state.test.mjs scripts/aster-cycle.test.mjs"
        expected: "exit code 0"
    status: "completed"
  - id: "phase4"
    name: "Workflow And Template Cutover"
    objective: "Make live lanes and issue templates use the new thread-teaching model."
    dependencies: ["phase3"]
    changes:
      - file: ".github/workflows/thread-teaching-derive.yml"
        action: "create"
        lines: "all"
        content_spec: |
          Replace approval-policy-derive with a thread-teaching derive workflow.
      - file: ".github/workflows/issue-triage.yml"
        action: "update"
        lines: "all"
        content_spec: |
          Derive active thread-teaching context for the live issue/PR thread.
      - file: ".github/workflows/docs-pr.yml"
        action: "update"
        lines: "all"
        content_spec: |
          Require collaboration issue input, derive thread-teaching context, and
          enforce docs-pr.publish authorization from that issue.
      - file: ".github/workflows/fix-pr.yml"
        action: "update"
        lines: "all"
        content_spec: |
          Require collaboration issue input, derive thread-teaching context, and
          enforce fix-pr.publish authorization from that issue.
      - file: ".github/workflows/skill-upstream.yml"
        action: "update"
        lines: "all"
        content_spec: |
          Require collaboration issue input and publish authorization before
          outbound upstream PR publication.
      - file: ".github/workflows/approval-policy-derive.yml"
        action: "delete"
        lines: "all"
        content_spec: "Remove the approval-only derive workflow."
      - file: ".github/ISSUE_TEMPLATE/collaboration.yml"
        action: "create"
        lines: "all"
        content_spec: |
          Add a collaboration issue template for memory-backed publication and
          teaching threads.
    acceptance_criteria:
      - id: "ac4_1"
        type: "boundary"
        description: "The workflow YAML files parse after the cutover."
        command: "python3 -c \"import yaml; [yaml.safe_load(open(p)) for p in ['.github/workflows/thread-teaching-derive.yml', '.github/workflows/issue-triage.yml', '.github/workflows/docs-pr.yml', '.github/workflows/fix-pr.yml', '.github/workflows/skill-upstream.yml']]; print('ok')\""
        expected: "ok"
    status: "completed"
  - id: "phase5"
    name: "Docs And Validation"
    objective: "Make the thread-teaching model the documented and checked canonical operating model."
    dependencies: ["phase4"]
    changes:
      - file: "docs/operations.md"
        action: "update"
        lines: "all"
        content_spec: |
          Replace approval-only guidance with the generic thread-teaching record
          grammar and explain publication gating from collaboration issues.
      - file: "docs/operating-model.md"
        action: "update"
        lines: "all"
        content_spec: |
          Make issues the canonical human-teaching layer and explain how they
          compile into state and training rows.
      - file: "docs/llm-training-spec.md"
        action: "update"
        lines: "all"
        content_spec: |
          Add thread-teaching rows and explain how issue responses become
          durable training data for aster.
      - file: "docs/flows.md"
        action: "update"
        lines: "all"
        content_spec: |
          Document thread-teaching-gated flow changes for issue-triage, docs-pr,
          fix-pr, and skill-upstream.
      - file: "docs/run-catalog.md"
        action: "update"
        lines: "all"
        content_spec: |
          Update live lane descriptions to reference thread-teaching gating and
          collaboration issue authorization.
      - file: "docs/skill-upstream.md"
        action: "update"
        lines: "all"
        content_spec: |
          Document the collaboration-issue publish gate as mandatory for
          outbound upstream PR publication.
      - file: "scripts/check.mjs"
        action: "update"
        lines: "all"
        content_spec: |
          Replace required-file references for approval-only files with the new
          thread-teaching files and workflow names.
    acceptance_criteria:
      - id: "ac5_1"
        type: "test"
        description: "Repo checks and site checks pass."
        command: "node scripts/check.mjs && npm run site:check && npm run site:build"
        expected: "exit code 0"
    status: "completed"

rollback:
  strategy: "per_phase"
  commands:
    phase1: "git checkout HEAD -- .ai/specs/active/aster-thread-teaching-cutover.yaml spec/thread-teaching-row.schema.json scripts/runx-control-schemas.mjs"
    phase2: "git checkout HEAD -- scripts/thread-teaching.mjs scripts/derive-thread-teaching-context.mjs scripts/derive-thread-teaching.mjs state/thread-teaching.json scripts/derive-approval-context.mjs scripts/derive-approved-policies.mjs state/approved-policies.json"
    phase3: "git checkout HEAD -- scripts/build-aster-context.mjs scripts/aster-core.mjs scripts/runx-agent-bridge.mjs scripts/promote-aster-state.mjs scripts/aster-cycle.mjs"
    phase4: "git checkout HEAD -- .github/workflows/thread-teaching-derive.yml .github/workflows/issue-triage.yml .github/workflows/docs-pr.yml .github/workflows/fix-pr.yml .github/workflows/skill-upstream.yml .github/workflows/approval-policy-derive.yml .github/ISSUE_TEMPLATE/collaboration.yml"
    phase5: "git checkout HEAD -- docs/operations.md docs/operating-model.md docs/llm-training-spec.md docs/flows.md docs/run-catalog.md docs/skill-upstream.md scripts/check.mjs"

