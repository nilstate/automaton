phases:
  - id: "phase1"
    name: "Target Selection And Chain Plan"
    objective: >
      Pick three upstream targets beyond icey-cli and document, per target,
      which gate selector it will exercise, which outcome it will drive
      (happy, closed-without-merge, failing-checks, or withdrawn
      authorization), and what evidence should be captured. Also note
      the discovered architecture constraint that skill-upstream.yml
      writes to a flat .artifacts/skill-upstream/ so per-target capture
      is done via `gh run download` post-run.
    changes:
      - file: "docs/dogfood.md"
        action: "create"
        lines: "all"
        content_spec: |
          Create the operator-facing dogfood log. Include an overview
          paragraph, a "Skill-chain approval-gate dogfood" section
          listing the three selected targets with a table (target,
          selector, outcome, evidence path), a per-target chain plan
          subsection, and a capture-convention subsection documenting
          the `gh run download` post-run artefact move.
    acceptance_criteria:
      - id: "ac1_1"
        type: "documentation"
        description: "Three additional targets are selected with planned selector and outcome."
        command: "bash -c 'n=$(grep -c -E \"docs-pr.publish|fix-pr.publish|skill-upstream.publish\" docs/dogfood.md); [ \"$n\" -ge 3 ] && echo ok || echo fail'"
        expected: "ok"
        result: "pass"
        executed_at: "2026-04-20T10:53:13Z"
        result_output: "ok"
    status: "pending"

  - id: "phase2"
    name: "Target 1 Happy Path"
    objective: >
      Run the full skill-contribution chain on target 1 through the
      happy path: collaboration issue authored, thread-teaching
      authorization granted, skill-upstream workflow dispatched,
      upstream PR opened and merged, merge-watch records acceptance,
      public evidence published.
    dependencies: ["phase1"]
    changes:
      - file: ".artifacts/skill-upstream/<target-1>/"
        action: "create"
        lines: "all"
        content_spec: |
          Per-target artefact bundle captured after the hosted
          skill-upstream workflow completes. Because the workflow
          writes to a flat .artifacts/skill-upstream/ directory, the
          dogfood pulls the CI-uploaded artefact locally with
          `gh run download <run-id> --name skill-upstream-<target-1>
          --dir .artifacts/skill-upstream/<target-1>`. Contents:
          SKILL.md, opportunity, research, candidate, contribution
          packet, pr-body.md, public feed event.
      - file: ".artifacts/merge-watch/<target-1>/"
        action: "create"
        lines: "all"
        content_spec: |
          Per-target watcher artefacts. Pulled down with
          `gh run download <run-id> --name merge-watch-<target-1>
          --dir .artifacts/merge-watch/<target-1>`. Contents:
          skill_upstream_state.json (state accepted_upstream),
          public_feed_event.json, registry_binding_request.json
          if registered.
      - file: ".artifacts/skill-upstream/<target-1>/run_metadata.json"
        action: "create"
        lines: "all"
        content_spec: |
          Dogfood-owned metadata file written locally per target so
          replay commands read from known paths rather than live `gh`
          queries. Schema: { target, upstream_repo, collaboration_issue_number,
          upstream_pr_number, skill_upstream_run_id, merge_watch_run_id,
          dispatched_at, outcome }.
    acceptance_criteria:
      - id: "ac2_1"
        type: "boundary"
        description: "Target 1 merge-watch records accepted_upstream in its named state file."
        command: "jq -r '.state' .artifacts/merge-watch/<target-1>/skill_upstream_state.json"
        expected: "accepted_upstream"
      - id: "ac2_2"
        type: "boundary"
        description: "Target 1 run metadata captures the workflow run id."
        command: "jq -r '.skill_upstream_run_id' .artifacts/skill-upstream/<target-1>/run_metadata.json"
        expected: "numeric run id present"
    status: "pending"

  - id: "phase3"
    name: "Target 2 Induced Failure Path"
    objective: >
      Run target 2 through an intentionally non-happy outcome. Options:
      collaboration issue authored without publish_authorization record
      (fail-closed at gate), or upstream PR closed-without-merge, or
      required checks failing. Choose whichever gives the cleanest
      fail-closed signal for our current stack.
    dependencies: ["phase1"]
    changes:
      - file: ".artifacts/skill-upstream/<target-2>/"
        action: "create"
        lines: "all"
        content_spec: |
          Per-target artefact bundle captured after the hosted run,
          pulled with `gh run download` as in phase 2. Includes
          run_metadata.json with outcome field populated (one of
          fail_closed_gate, closed_without_merge, failing_checks).
      - file: ".artifacts/merge-watch/<target-2>/"
        action: "create"
        lines: "all"
        content_spec: |
          Per-target watcher output showing a non-happy state
          (maintainer_review, rejected, or abandoned). Absent
          entirely if the failure-injection path is fail-closed
          at the gate before any upstream PR is opened.
    acceptance_criteria:
      - id: "ac3_1"
        type: "boundary"
        description: "Target 2 outcome field records a recognised non-happy path."
        command: "jq -r '.outcome' .artifacts/skill-upstream/<target-2>/run_metadata.json"
        expected: "one of fail_closed_gate, closed_without_merge, failing_checks"
      - id: "ac3_2"
        type: "boundary"
        description: "Target 2 run metadata captures the workflow run id."
        command: "jq -r '.skill_upstream_run_id' .artifacts/skill-upstream/<target-2>/run_metadata.json"
        expected: "numeric run id present"
    status: "pending"

  - id: "phase4"
    name: "Target 3 Edge Selector"
    objective: >
      Run target 3 to cover a gate selector not yet exercised by
      targets 1 and 2 (e.g. if target 1 used skill-upstream.publish
      and target 2 used fail-closed on skill-upstream.publish, target 3
      should exercise fix-pr.publish or docs-pr.publish on a real
      manual PR lane rather than only skill contribution).
    dependencies: ["phase1"]
    changes:
      - file: ".artifacts/skill-upstream/<target-3>/"
        action: "create"
        lines: "all"
        content_spec: |
          Either a third skill-contribution run or a docs-pr/fix-pr
          run, per the selector chosen in phase 1.
      - file: "state/thread-teaching.json"
        action: "update"
        lines: "all"
        content_spec: |
          Derived state includes authorizations covering at least
          docs-pr.publish, fix-pr.publish, and skill-upstream.publish
          selectors across the three targets.
    acceptance_criteria:
      - id: "ac4_1"
        type: "test"
        description: "Thread-teaching state includes the three selectors."
        command: "node -e \"const s=require('./state/thread-teaching.json'); const sels=new Set(); for (const t of s.threads||[]) for (const r of t.records||[]) for (const a of r.applies_to||[]) sels.add(a); for (const need of ['docs-pr.publish','fix-pr.publish','skill-upstream.publish']) if (!sels.has(need)) { console.error('missing',need); process.exit(1);} console.log('ok');\""
        expected: "ok"
    status: "pending"

  - id: "phase5"
    name: "Defect Triage"
    objective: >
      Catalogue every defect surfaced across targets 1-3. Fix
      chain-halting blockers inline (with a minimal, scoped patch
      in a follow-up draft-then-land sequence) and record
      non-blocking defects as new draft specs with reproduction
      steps drawn from captured artefacts.
    dependencies: ["phase2", "phase3", "phase4"]
    changes:
      - file: ".ai/specs/drafts/"
        action: "create"
        lines: "all"
        content_spec: |
          One draft spec per non-blocking defect discovered, with
          reproduction steps grounded in the captured .artifacts/*
          paths.
      - file: "docs/dogfood.md"
        action: "update"
        lines: "all"
        content_spec: |
          Add a defects section summarising each finding, severity,
          and follow-up disposition (fixed inline, draft spec id, or
          wontfix with reason).
    acceptance_criteria:
      - id: "ac5_1"
        type: "documentation"
        description: "Defects section is present in docs/dogfood.md."
        command: "grep -c -E 'Defects surfaced|Defect triage' docs/dogfood.md"
        expected: "defects section present"
    status: "pending"

  - id: "phase6"
    name: "Aggregate Findings And Next-Move Recommendation"
    objective: >
      Aggregate receipt/journal volume, gate coverage, defects,
      and time-to-merge into a findings report. State explicitly
      whether governed receipts or hosted memory is the next
      platform build, with evidence grounded in dogfood traffic.
    dependencies: ["phase5"]
    changes:
      - file: ".ai/reviews/dogfood-skill-chain-approval-gates.md"
        action: "create"
        lines: "all"
        content_spec: |
          Fresh review file summarising the dogfood round: per-target
          outcomes, selector coverage, defects, receipt volume, and
          an explicit "Next move" recommendation between governed
          receipts, hosted memory, and a third option with its
          rationale. Keep the file in the standard scafld review
          schema so the spec can archive cleanly.
      - file: "docs/dogfood.md"
        action: "update"
        lines: "all"
        content_spec: |
          Append a "Trajectory and next move" section mirroring the
          review file's recommendation so the call is documented in
          the public operator docs.
    acceptance_criteria:
      - id: "ac6_1"
        type: "documentation"
        description: "Review file and dogfood.md both contain the next-move recommendation."
        command: "grep -l -E 'Next move|Recommendation' .ai/reviews/dogfood-skill-chain-approval-gates.md docs/dogfood.md | wc -l"
        expected: "2"
    status: "pending"

rollback:
  strategy: "per_phase"
  commands:
    phase1: "git checkout HEAD -- docs/dogfood.md"
    phase2: "rm -rf .artifacts/skill-upstream/<target-1> .artifacts/collaboration-record/<issue-1> .artifacts/merge-watch/<pr-1>"
    phase3: "rm -rf .artifacts/skill-upstream/<target-2> .artifacts/collaboration-record/<issue-2> .artifacts/merge-watch/<pr-2>"
    phase4: "rm -rf .artifacts/skill-upstream/<target-3> .artifacts/collaboration-record/<issue-3> .artifacts/merge-watch/<pr-3> && git checkout HEAD -- state/thread-teaching.json"
    phase5: "git checkout HEAD -- docs/dogfood.md && rm -f .ai/specs/drafts/<follow-up-draft>.yaml"
    phase6: "git checkout HEAD -- docs/dogfood.md && rm -f .ai/reviews/dogfood-skill-chain-approval-gates.md"
