spec_version: "1.1"
task_id: "dogfood-skill-chain-approval-gates"
created: "2026-04-20T10:40:00Z"
updated: "2026-04-20T11:08:01Z"
status: "cancelled"
harden_status: "not_run"

task:
  title: "Dogfood thread-teaching approval gates across skill chains"
  summary: >
    Run multiple real skill-contribution chains end-to-end through the
    recently-landed thread-teaching approval gate, governed collaboration
    record, and merge-watch stack. The aim is to exercise the approval
    gate under real pressure across at least three upstream targets,
    cover failure paths (not just the icey-cli happy path), and generate
    the receipt/journal traffic that will tell us whether the governed
    receipts product surface and hosted memory substrate are justified.

    This is a dogfood task, not a build task. It runs existing lanes,
    collects evidence, surfaces defects, and produces an aggregate
    findings report. Any code change required to unblock a chain is
    recorded as a follow-up spec, not landed inside this one.
  size: "large"
  risk_level: "medium"
  context:
    packages:
      - ".github/workflows"
      - "scripts"
      - ".artifacts"
      - "state"
      - "docs"
    files_impacted:
      - path: ".artifacts/skill-upstream/"
        lines: "all"
        reason: "Per-target skill-contribution artefacts from each dogfood run."
      - path: ".artifacts/collaboration-record/"
        lines: "all"
        reason: "Thread-teaching packets produced by the collaboration-record workflow for each dogfood issue."
      - path: ".artifacts/merge-watch/"
        lines: "all"
        reason: "Post-merge watcher output per upstream PR."
      - path: "state/thread-teaching.json"
        lines: "all"
        reason: "Derived thread-teaching state grows as dogfood issues produce authorizations."
      - path: "docs/dogfood.md"
        lines: "all"
        reason: "Record the dogfood trajectory and findings."
      - path: ".ai/reviews/dogfood-skill-chain-approval-gates.md"
        lines: "all"
        reason: "Aggregate findings report from the dogfood round."
    invariants:
      - "issues_are_canonical_human_teaching_layer"
      - "receipts_stay_canonical"
      - "derived_memory_is_rebuildable"
      - "no_upstream_automerge"
      - "fail_closed_without_authorization"
    related_docs:
      - "docs/skill-upstream.md"
      - "docs/run-catalog.md"
      - "docs/flows.md"
      - "docs/dogfood.md"
      - ".ai/specs/archive/2026-04/aster-thread-teaching-cutover.yaml"
      - ".ai/specs/archive/2026-04/governed-collaboration-surface-hardening.yaml"
      - ".ai/specs/archive/2026-04/skill-contribution-watch-post-merge.yaml"
      - ".ai/specs/archive/2026-04/dogfood-icey-cli-skill-contribution.yaml"
    cwd: "/home/kam/dev/aster"
  objectives:
    - "Run the full skill-contribution chain against at least three upstream targets beyond icey-cli."
    - "Exercise the thread-teaching approval gate for docs-pr.publish, fix-pr.publish, and skill-upstream.publish selectors under real traffic."
    - "Cover non-happy-path outcomes: closed-without-merge, failing-checks, withdrawn-authorization, at least one per target set."
    - "Capture per-run receipts, journal, and evidence artefacts so governed-receipts pressure can be measured."
    - "Record any defects surfaced by real traffic as new drafts; do not land fixes inside this spec unless a blocker halts the dogfood."
    - "Produce an aggregate findings report naming what the gate stack did well, where it failed, and what the next platform move should be."
  scope:
    in_scope:
      - "Target selection across nilstate, sourcey, and auscaster orgs"
      - "Collaboration issue authoring for each target"
      - "Dispatching skill-upstream workflow from hosted CI"
      - "Monitoring merge-watch output on each upstream PR"
      - "Intentional failure injection to exercise fail-closed paths"
      - "Receipt/journal traffic capture for evidence"
      - "Defect triage: blocking fixes inline, non-blocking as follow-up drafts"
      - "Aggregate findings write-up in docs/dogfood.md and the review file"
    out_of_scope:
      - "Building new approval gate features"
      - "Building governed receipts search/replay surfaces"
      - "Building the hosted memory substrate"
      - "Auto-merging upstream PRs"
      - "Adding x.yaml or runx-internal files to upstream targets"
      - "Selecting targets outside repos we already maintain"
  dependencies:
    - "skill-upstream workflow deployed on main of auscaster/aster"
    - "thread-teaching-derive workflow deployed"
    - "collaboration-record workflow deployed"
    - "merge-watch workflow deployed"
    - "UPSTREAM_CONTRIBUTION_TOKEN or RUNX_WORKSPACE_PAT with repo scope for target orgs"
    - "RUNX_PUBLIC_EVIDENCE_TOKEN for proof-wall publication"
    - "GitHub CLI authenticated locally for manual verification"
  assumptions:
    - "Three additional targets is enough signal to inform the governed-receipts vs hosted-memory decision; more becomes speculative."
    - "Nilstate-owned and sourcey-owned repos are valid dogfood targets because we can merge the upstream PR ourselves if needed without violating no-automerge (human approval is ours to grant)."
    - "Failure paths produce as much learning as happy paths, so at least one intentional failure is required."
    - "Any defect that does not block the chain completing is captured as a draft spec, not fixed inline."
  touchpoints:
    - area: "target selection"
      description: "Pick three targets with clear build/release/operator workflows to feed the SKILL.md generator."
      owners: ["aster"]
    - area: "approval gate"
      description: "Author collaboration issues that exercise every gate selector at least once, including fail-closed paths."
      owners: ["aster"]
    - area: "merge-watch"
      description: "Observe watcher output for happy, non-merged, and failing-checks outcomes."
      owners: ["aster"]
    - area: "receipt traffic"
      description: "Instrument receipt/journal capture per run to feed the governed-receipts scope question."
      owners: ["aster", "runx"]
    - area: "findings"
      description: "Aggregate into docs/dogfood.md and the review file, with concrete recommendations."
      owners: ["aster"]
  risks:
    - description: "A target repo rejects the upstream PR for external reasons, muddying the dogfood signal."
      impact: "medium"
      mitigation: "Select targets we maintain; treat external reject as a legitimate failure-path data point."
    - description: "The approval gate blocks a chain unintentionally because of a real defect."
      impact: "high"
      mitigation: "Pause the chain, open a blocking-defect draft spec, resume after fix. Do not override --human-reviewed to bypass."
    - description: "Hardcoded run ids accumulate in the spec, making it non-re-runnable (repeating the icey-cli dogfood smell)."
      impact: "medium"
      mitigation: "Record run ids in artefacts and the findings report, not in acceptance_criteria commands."
    - description: "Receipt volume from three dogfood runs is too small to draw a real governed-receipts conclusion."
      impact: "medium"
      mitigation: "Supplement per-run receipts with the cumulative traffic already captured from live issue-triage and docs-pr lanes when analysing the pressure signal."
  acceptance:
    validation_profile: "standard"
    definition_of_done:
      - id: "dod1"
        description: "Three upstream targets beyond icey-cli have a completed collaboration-record + skill-upstream + merge-watch chain."
        status: "pending"
      - id: "dod2"
        description: "Every thread-teaching gate selector used in the dogfood (docs-pr.publish, fix-pr.publish, skill-upstream.publish) has been exercised with at least one allow and one fail-closed outcome."
        status: "pending"
      - id: "dod3"
        description: "At least one non-happy-path outcome is recorded: closed-without-merge, failing-checks, or withdrawn authorization."
        status: "pending"
      - id: "dod4"
        description: "Per-run receipt, journal, and evidence artefacts are captured under .artifacts/skill-upstream/, .artifacts/collaboration-record/, and .artifacts/merge-watch/."
        status: "pending"
      - id: "dod5"
        description: "Any blocking defects surfaced during dogfood are either fixed inline (if they halt a chain) or captured as new draft specs with concrete reproduction steps."
        status: "pending"
      - id: "dod6"
        description: "docs/dogfood.md is updated with per-target notes and the aggregate dogfood trajectory."
        status: "pending"
      - id: "dod7"
        description: "Aggregate findings report in the review file states whether governed receipts or hosted memory should be built next, with evidence."
        status: "pending"
    validation:
      - id: "v1"
        type: "boundary"
        description: "Three additional target directories exist under .artifacts/skill-upstream/ beyond icey-cli."
        command: "ls .artifacts/skill-upstream/ | grep -v '^icey-cli$' | wc -l"
        expected: "at least 3"
      - id: "v2"
        type: "boundary"
        description: "Per-target collaboration-record packets exist."
        command: "find .artifacts/collaboration-record -maxdepth 2 -name 'packet.json' | wc -l"
        expected: "at least 3"
      - id: "v3"
        type: "boundary"
        description: "Per-target merge-watch outputs exist."
        command: "find .artifacts/merge-watch -maxdepth 2 -name 'skill_upstream_state.json' | wc -l"
        expected: "at least 3"
      - id: "v4"
        type: "test"
        description: "Thread-teaching state records authorizations for every selector exercised."
        command: "node -e \"const s=require('./state/thread-teaching.json'); const sels=new Set(); for (const t of s.threads||[]) for (const r of t.records||[]) for (const a of r.applies_to||[]) sels.add(a); console.log([...sels].join(','));\""
        expected: "includes docs-pr.publish, fix-pr.publish, skill-upstream.publish"
      - id: "v5"
        type: "documentation"
        description: "docs/dogfood.md describes each target run."
        command: "grep -c -E '^\\| [0-9]+ \\|' docs/dogfood.md"
        expected: "at least 3 target rows"
      - id: "v6"
        type: "documentation"
        description: "Aggregate findings include a next-move recommendation."
        command: "grep -c -E 'Next move|Recommendation|Governed receipts|Hosted memory' .ai/reviews/dogfood-skill-chain-approval-gates.md"
        expected: "recommendation section present"
  constraints:
    approvals_required: []
    non_goals:
      - "No code changes outside docs, spec, and fix-forward blockers"
      - "No upstream automerge"
      - "No new approval-gate features"
      - "No governed-receipts surface work"
      - "No hosted-memory substrate work"
  info_sources:
    - "docs/skill-upstream.md"
    - "docs/run-catalog.md"
    - "docs/dogfood.md"
    - ".artifacts/skill-upstream/icey-cli/"
    - "state/thread-teaching.json"
    - ".ai/specs/archive/2026-04/aster-thread-teaching-cutover.yaml"
    - ".ai/specs/archive/2026-04/governed-collaboration-surface-hardening.yaml"
    - ".ai/specs/archive/2026-04/skill-contribution-watch-post-merge.yaml"
  notes: >
    Target shortlist (subject to phase-1 review): nilstate/icey (core library),
    sourcey/sourcey (CLI + docs pipeline), nilstate/scafld or auscaster/scafld
    (spec-driven CLI), sourcey/mcp-parser, nilstate/symple. Final set of
    three is chosen in phase 1 based on current repo health and the
    selectors we want to exercise. Each target should exercise a distinct
    gate selector where possible.

