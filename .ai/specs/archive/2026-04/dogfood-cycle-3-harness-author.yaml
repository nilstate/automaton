task:
  title: "Dogfood cycle 3: improve harness-author"
  summary: >
    Third cycle. Target: harness-author, the fixture/spec-authoring
    half of improve-skill. Cycles 1 and 2 taught improve-skill and
    receipt-review that needs_resolution is a healthy pause. The
    downstream consequence is that receipt-review can now return
    `verdict: pass` with empty `improvement_proposals` — and
    harness-author needs to know what to do with that input instead
    of inventing changes.

    Cycle 3 adds SKILL.md guidance and a harness case that lock in
    the correct behaviour: when upstream review is pass with no
    proposals, harness-author produces a minimal happy-path
    regression fixture rather than a fabricated skill_spec /
    execution_plan change.
  size: "medium"
  risk_level: "low"
  context:
    packages:
      - "../runx/oss/skills/harness-author"
      - ".artifacts/dogfood-cycles"
      - "docs"
    files_impacted:
      - path: "../runx/oss/skills/harness-author/SKILL.md"
        lines: "as-needed"
        reason: "Clarify behaviour when upstream review.verdict is pass."
      - path: "../runx/oss/skills/harness-author/X.yaml"
        lines: "as-needed"
        reason: "Add a pass-through harness case."
      - path: ".artifacts/dogfood-cycles/dogfood-cycle-3-harness-author/"
        lines: "all"
        reason: "Evidence bundle."
      - path: "docs/dogfood.md"
        lines: "as-needed"
        reason: "Catalog + cycle log + pressure rows."
    invariants:
      - "receipts_stay_canonical"
      - "bounded_improvement_per_cycle"
      - "no_cycle_is_a_no_op"
    related_docs:
      - "docs/dogfood.md"
      - "../runx/oss/skills/harness-author/SKILL.md"
    cwd: "/home/kam/dev/aster"
  objectives:
    - "Invoke harness-author with a pass-verdict upstream review and capture its output."
    - "Clarify in SKILL.md that a pass verdict yields a minimal regression fixture, not fabricated changes."
    - "Add a harness case exercising that behaviour."
    - "Verify harness stays green."
    - "Record in docs/dogfood.md."
  scope:
    in_scope:
      - "Editing harness-author SKILL.md and X.yaml harness"
      - "Running runx CLI on harness-author"
      - "Updating docs/dogfood.md"
    out_of_scope:
      - "Edits outside harness-author"
      - "Changes to improve-skill chain wiring"
      - "Kernel changes"
      - "External PRs"
  dependencies:
    - "Cycle 2 complete and pushed."
  assumptions:
    - "harness-author's current harness tolerates adding a third case."
    - "The pass-verdict behaviour is a SKILL.md clarification, not a contract change."
  touchpoints:
    - area: "harness-author"
      description: "One bounded SKILL.md + X.yaml change."
      owners: ["aster", "runx"]
    - area: "campaign"
      description: "docs/dogfood.md rows."
      owners: ["aster"]
  risks:
    - description: "Over-specifying pass-verdict behaviour could conflict with future harness-author extensions."
      impact: "low"
      mitigation: "Keep the SKILL.md addition descriptive rather than prescriptive; harness case is the binding check."
  acceptance:
    validation_profile: "standard"
    definition_of_done:
      - id: "dod1"
        description: "harness-author invoked on a pass-verdict review; diagnosis captured."
        status: "pending"
      - id: "dod2"
        description: "SKILL.md documents pass-verdict behaviour."
        status: "pending"
      - id: "dod3"
        description: "X.yaml has a new harness case for the pass-verdict path."
        status: "pending"
      - id: "dod4"
        description: "harness-author harness passes after the change."
        status: "pending"
      - id: "dod5"
        description: "Cycle evidence bundle complete."
        status: "pending"
      - id: "dod6"
        description: "docs/dogfood.md updated."
        status: "pending"
    validation:
      - id: "v1"
        type: "boundary"
        description: "Cycle evidence folder complete."
        command: "bash -c 'd=.artifacts/dogfood-cycles/dogfood-cycle-3-harness-author; for f in objective.md receipt.json diagnosis.json improvement.md patch.diff cycle_metadata.json; do [ -s \"$d/$f\" ] || { echo missing $f; exit 1; }; done; echo ok'"
        expected: "ok"
      - id: "v2"
        type: "test"
        description: "harness-author harness passes."
        command: "bash -c 'cd ../runx && runx harness oss/skills/harness-author --json > /tmp/ha-harness.json && s=$(jq -r .status /tmp/ha-harness.json); [ \"$s\" = success ] && echo ok || echo fail'"
        expected: "ok"
      - id: "v3"
        type: "documentation"
        description: "docs/dogfood.md references cycle 3."
        command: "bash -c 'n=$(grep -c dogfood-cycle-3-harness-author docs/dogfood.md); [ \"$n\" -ge 2 ] && echo ok || echo fail'"
        expected: "ok"
  constraints:
    approvals_required: []
    non_goals:
      - "No kernel changes"
      - "No external PRs"

