task:
  title: "Dogfood cycle 5: add minimal harness to issue-to-pr"
  summary: >
    Cycle 5 attacks a real coverage gap discovered while walking the
    catalog: issue-to-pr has no harness block at all in its X.yaml,
    despite being one of the most complex chain skills in runx.
    Without at least a smoke-test harness, any regression in how the
    chain loads, resolves inputs, or dispatches its first step is
    invisible. This cycle adds a minimal happy-path smoke fixture
    that proves the skill validates and enters execution.
  size: "medium"
  risk_level: "low"
  context:
    packages:
      - "../runx/oss/skills/issue-to-pr"
      - ".artifacts/dogfood-cycles"
      - "docs"
    files_impacted:
      - path: "../runx/oss/skills/issue-to-pr/X.yaml"
        lines: "as-needed"
        reason: "Add a harness block with a smoke-test case."
      - path: ".artifacts/dogfood-cycles/dogfood-cycle-5-issue-to-pr/"
        lines: "all"
        reason: "Evidence bundle."
      - path: "docs/dogfood.md"
        lines: "as-needed"
        reason: "Catalog + cycle log + pressure rows."
    invariants:
      - "bounded_improvement_per_cycle"
      - "no_cycle_is_a_no_op"
    related_docs:
      - "docs/dogfood.md"
    cwd: "/home/kam/dev/aster"
  objectives:
    - "Add a harness block to issue-to-pr/X.yaml with a smoke-test case."
    - "Verify runx harness oss/skills/issue-to-pr passes."
    - "Record in docs/dogfood.md."
  scope:
    in_scope:
      - "Editing issue-to-pr X.yaml."
      - "Updating docs/dogfood.md."
    out_of_scope:
      - "Full coverage of issue-to-pr's chain."
      - "Other skills."
      - "Kernel changes."
  dependencies:
    - "runx resume fix committed (cycles 1-4)."
  assumptions:
    - "issue-to-pr's chain is well-formed enough to reach the first step's needs_resolution without agent help."
  touchpoints:
    - area: "issue-to-pr harness"
      description: "One smoke-test case."
      owners: ["aster", "runx"]
  risks:
    - description: "First step validates but blocks early due to a missing input not covered by defaults."
      impact: "low"
      mitigation: "Accept needs_resolution as the expected status for the smoke test."
  acceptance:
    validation_profile: "standard"
    definition_of_done:
      - id: "dod1"
        description: "Harness block added."
        status: "pending"
      - id: "dod2"
        description: "Harness passes."
        status: "pending"
      - id: "dod3"
        description: "Cycle evidence bundle complete."
        status: "pending"
      - id: "dod4"
        description: "docs/dogfood.md updated."
        status: "pending"
    validation:
      - id: "v1"
        type: "boundary"
        description: "Evidence folder complete."
        command: "bash -c 'd=.artifacts/dogfood-cycles/dogfood-cycle-5-issue-to-pr; for f in objective.md receipt.json diagnosis.json improvement.md patch.diff cycle_metadata.json; do [ -s \"$d/$f\" ] || { echo missing $f; exit 1; }; done; echo ok'"
        expected: "ok"
      - id: "v2"
        type: "test"
        description: "issue-to-pr harness passes."
        command: "bash -c 'cd ../runx && runx harness oss/skills/issue-to-pr --json > /tmp/itp-harness.json && s=$(jq -r .status /tmp/itp-harness.json); [ \"$s\" = success ] && echo ok || echo fail'"
        expected: "ok"
      - id: "v3"
        type: "documentation"
        description: "docs/dogfood.md references cycle 5."
        command: "bash -c 'n=$(grep -c dogfood-cycle-5-issue-to-pr docs/dogfood.md); [ \"$n\" -ge 2 ] && echo ok || echo fail'"
        expected: "ok"
  constraints:
    approvals_required: []
    non_goals:
      - "No full coverage"
      - "No kernel changes"

