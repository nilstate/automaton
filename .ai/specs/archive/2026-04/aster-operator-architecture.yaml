phases:
  - id: "phase1"
    name: "Boundary And Topology"
    objective: "Document the hard ownership split between runx and aster."
    changes:
      - file: "docs/architecture.md"
        action: "create"
        content_spec: |
          Define the runx/aster boundary, repo topology, and the rule that
          runx may host generic memory while aster owns operator semantics.
          Acknowledge the current docs/.artifacts shape and the target
          doctrine/state/history/reflections/site convergence shape.
      - file: "README.md"
        action: "update"
        content_spec: |
          Link to the architecture plan from the repo overview.
    acceptance_criteria:
      - id: "ac1_1"
        type: "documentation"
        description: "Boundary language is present and explicit."
        command: "rg -n \"runx may host the machine|aster owns the mind\" docs/architecture.md"
        expected: "boundary language present"
        result:
          status: "pass"
          timestamp: "2026-04-20T10:36:41Z"
          output: "68:In plain language: runx may host the machine and aster owns the mind."
    summary: "Verified the hard boundary language, repo topology, and public-face split."
    status: "completed"
  - id: "phase2"
    name: "Lane Contracts"
    objective: "Turn the live lanes into explicit contracts rather than implied workflow behavior."
    dependencies: ["phase1"]
    changes:
      - file: "docs/architecture.md"
        action: "update"
        content_spec: |
          Add one lane matrix covering purpose, input, output, public artifact,
          approval mode, feed eligibility, and memory effect.
    acceptance_criteria:
      - id: "ac2_1"
        type: "documentation"
        description: "Lane contract table is present."
        command: "rg -n \"\\| lane \\| purpose \\| input \\| output \\| public artifact \\| approval mode \\| feed eligible \\| memory effect \\|\" docs/architecture.md"
        expected: "lane table present"
        result:
          status: "pass"
          timestamp: "2026-04-20T10:36:41Z"
          output: "215:| lane | purpose | input | output | public artifact | approval mode | feed eligible | memory effect |"
    summary: "Verified the lane contract matrix covers purpose, artifact, approval mode, feed eligibility, and memory effect."
    status: "completed"
  - id: "phase3"
    name: "Data Ownership"
    objective: "Define canonical, derived, and public classes so future memory work has a stable contract."
    dependencies: ["phase1"]
    changes:
      - file: "docs/architecture.md"
        action: "update"
        content_spec: |
          Add the canonical-vs-derived-vs-public table and explain rebuildable
          derived context.
    acceptance_criteria:
      - id: "ac3_1"
        type: "documentation"
        description: "Data ownership table is present."
        command: "rg -n \"Canonical, Derived, Public|canonical evidence|operator projections\" docs/architecture.md"
        expected: "ownership sections present"
        result:
          status: "pass"
          timestamp: "2026-04-20T10:36:41Z"
          output: "231:## Canonical, Derived, Public 237:| canonical evidence | receipts, approvals, artifacts, workflow packets | `runx` or the lane producer | receipt/artifact store | append-only | 240:| operator projections | targets, opportunities, priorities, capabilities | `aster` | `state/` first, store later | revisable |"
    summary: "Verified the canonical, derived, and public ownership table plus rebuildable derived-context rule."
    status: "completed"
  - id: "phase4"
    name: "Migration Contract"
    objective: "Define how the current repo shape converges on the target operator shape."
    dependencies: ["phase1"]
    changes:
      - file: "docs/architecture.md"
        action: "update"
        content_spec: |
          Add current reality and repo migration sections that explain how
          today's docs/ + Sourcey + .artifacts layout evolves into
          doctrine/state/history/reflections/site.
    acceptance_criteria:
      - id: "ac4_1"
        type: "documentation"
        description: "Migration sections are present."
        command: "rg -n \"Current Reality|Repo Migration|Sourcey is optional tooling|\\.artifacts/\" docs/architecture.md"
        expected: "migration language present"
        result:
          status: "pass"
          timestamp: "2026-04-20T10:36:42Z"
          output: "85:## Current Reality 91:- `.artifacts/proving-ground/` and other `.artifacts/` trees are the current layer-0 evidence surface 129:- Sourcey is optional tooling, not part of the 10/10 architecture 194:## Repo Migration"
    summary: "Verified the current-reality and repo-migration sections describe the move from docs and artifacts to doctrine, state, history, reflections, and site."
    status: "completed"
  - id: "phase5"
    name: "Core Update Rules"
    objective: "Define how doctrine, state, history, reflections, and site may be updated."
    dependencies: ["phase1"]
    changes:
      - file: "docs/architecture.md"
        action: "update"
        content_spec: |
          Add explicit update rules for doctrine/, state/, history/,
          reflections/, and site/ so the aster core has filesystem-level
          governance rather than vibe-based governance.
    acceptance_criteria:
      - id: "ac5_1"
        type: "documentation"
        description: "Core update rules are present."
        command: "rg -n 'Aster Core Update Rules|### `doctrine/`|### `state/`|### `history/`|### `reflections/`|### `site/`' docs/architecture.md"
        expected: "core update rules present"
        result:
          status: "pass"
          timestamp: "2026-04-20T10:36:42Z"
          output: "601:## Aster Core Update Rules 605:### `doctrine/` 611:### `state/` 621:### `history/` 629:### `reflections/` 637:### `site/`"
    summary: "Verified explicit filesystem update rules for doctrine, state, history, reflections, and site."
    status: "completed"
  - id: "phase6"
    name: "Promotion And Concurrency"
    objective: "Define promotion rules and conflict handling for aster-managed state."
    dependencies: ["phase5"]
    changes:
      - file: "docs/architecture.md"
        action: "update"
        content_spec: |
          Add promotion rules from reflection to state to history to site, plus
          conflict rules for concurrent state updates.
    acceptance_criteria:
      - id: "ac6_1"
        type: "documentation"
        description: "Promotion and concurrency rules are present."
        command: "rg -n \"Promotion Rules|optimistic concurrency|conflicting writers must fail closed\" docs/architecture.md"
        expected: "promotion and concurrency rules present"
        result:
          status: "pass"
          timestamp: "2026-04-20T10:36:42Z"
          output: "617:- concurrent state updates must use optimistic concurrency against the last 619:- conflicting writers must fail closed and emit a reflection or correction path 644:## Promotion Rules"
    summary: "Verified promotion ordering plus optimistic-concurrency and fail-closed conflict rules."
    status: "completed"

