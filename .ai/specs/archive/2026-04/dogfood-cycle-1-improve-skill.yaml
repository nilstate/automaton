phases:
  - id: "phase1"
    name: "Pick objective and invoke improve-skill"
    objective: >
      Choose one real failing receipt under .artifacts/runx-dogfood/
      (or run a fresh target skill to produce one), write the cycle
      objective, and invoke `runx improve-skill --receipt <id>` to
      capture the diagnosis + proposal.
    changes:
      - file: ".artifacts/dogfood-cycles/dogfood-cycle-1-improve-skill/objective.md"
        action: "create"
        lines: "all"
        content_spec: |
          One paragraph on the chosen objective and success criterion.
          Name the upstream receipt path and the target skill being
          exercised.
      - file: ".artifacts/dogfood-cycles/dogfood-cycle-1-improve-skill/receipt.json"
        action: "create"
        lines: "all"
        content_spec: |
          Copy of the source receipt used as input to improve-skill.
      - file: ".artifacts/dogfood-cycles/dogfood-cycle-1-improve-skill/diagnosis.json"
        action: "create"
        lines: "all"
        content_spec: |
          Full JSON output from receipt-review inside improve-skill.
          Includes verdict, failure_summary, improvement_proposals[].
      - file: ".artifacts/dogfood-cycles/dogfood-cycle-1-improve-skill/improvement.md"
        action: "create"
        lines: "all"
        content_spec: |
          Harness-author output plus a short human-written rationale
          explaining which proposal was chosen and why.
    acceptance_criteria:
      - id: "ac1_1"
        type: "boundary"
        description: "All four phase-1 files exist and are non-empty."
        command: "bash -c 'd=.artifacts/dogfood-cycles/dogfood-cycle-1-improve-skill; for f in objective.md receipt.json diagnosis.json improvement.md; do [ -s \"$d/$f\" ] || { echo missing $f; exit 1; }; done; echo ok'"
        expected: "ok"
        result: "pass"
        executed_at: "2026-04-20T11:21:49Z"
        result_output: "ok"
    status: "pending"

  - id: "phase2"
    name: "Apply the bounded improvement"
    objective: >
      Apply the chosen proposal as a bounded edit to improve-skill
      (SKILL.md, X.yaml, or a harness fixture). Produce the patch and
      bump the skill's declared version. If no actionable improvement
      can be made, record verdict `no_improvement_found` and stop the
      cycle cleanly.
    dependencies: ["phase1"]
    changes:
      - file: "../runx/oss/skills/improve-skill/SKILL.md"
        action: "update"
        lines: "as-needed"
        content_spec: |
          Only if the chosen proposal targets SKILL.md. Keep the edit
          bounded; anything larger spawns a follow-up draft.
      - file: "../runx/oss/skills/improve-skill/X.yaml"
        action: "update"
        lines: "as-needed"
        content_spec: |
          Only if the proposal targets chain wiring or harness fixtures
          in X.yaml. Keep bounded.
      - file: ".artifacts/dogfood-cycles/dogfood-cycle-1-improve-skill/patch.diff"
        action: "create"
        lines: "all"
        content_spec: |
          `git diff` of the landed improvement for audit.
    acceptance_criteria:
      - id: "ac2_1"
        type: "boundary"
        description: "Patch file exists (non-empty diff or explicitly empty with a no_improvement_found note)."
        command: "bash -c 'p=.artifacts/dogfood-cycles/dogfood-cycle-1-improve-skill/patch.diff; [ -f \"$p\" ] && echo ok'"
        expected: "ok"
        result: "pass"
        executed_at: "2026-04-20T11:21:49Z"
        result_output: "ok"
    status: "pending"

  - id: "phase3"
    name: "Verify via harness and record pressure signals"
    objective: >
      Run the improve-skill harness to verify the change. Write
      cycle_metadata.json including the pressure signals computed from
      the receipt.
    dependencies: ["phase2"]
    changes:
      - file: ".artifacts/dogfood-cycles/dogfood-cycle-1-improve-skill/cycle_metadata.json"
        action: "create"
        lines: "all"
        content_spec: |
          Per the schema in docs/dogfood.md: cycle_id, target_skill,
          target_skill_path, objective, runx_run_id, receipt_path,
          verdict, improvement_summary, version_before, version_after,
          spec_links, started_at, completed_at, and the
          receipt_pressure_signals block (receipt_bytes, journal_entries,
          chain_steps, search_candidates).
    acceptance_criteria:
      - id: "ac3_1"
        type: "test"
        description: "improve-skill harness passes after the change."
        command: "bash -c 'cd ../runx && runx harness oss/skills/improve-skill --json > /tmp/imp-harness.json && s=$(jq -r .status /tmp/imp-harness.json); [ \"$s\" = success ] && echo ok || echo fail'"
        expected: "ok"
        result: "pass"
        executed_at: "2026-04-20T11:21:50Z"
        result_output: "ok"
      - id: "ac3_2"
        type: "boundary"
        description: "cycle_metadata.json is well-formed and includes the pressure_signals block."
        command: "bash -c 'jq -e \".receipt_pressure_signals.receipt_bytes!=null\" .artifacts/dogfood-cycles/dogfood-cycle-1-improve-skill/cycle_metadata.json > /dev/null && echo ok'"
        expected: "ok"
        result: "pass"
        executed_at: "2026-04-20T11:21:50Z"
        result_output: "ok"
    status: "pending"

  - id: "phase4"
    name: "Record in docs/dogfood.md"
    objective: >
      Update the skill catalog row, cycle log row, and pressure-signals
      row in docs/dogfood.md so subsequent cycles see the current state.
    dependencies: ["phase3"]
    changes:
      - file: "docs/dogfood.md"
        action: "update"
        lines: "as-needed"
        content_spec: |
          Flip the improve-skill catalog row to `dogfooded` with cycle
          id `dogfood-cycle-1-improve-skill` and the new version.
          Append a cycle log row (cycle id, skill, verdict, version
          bump, improvement summary, receipt bytes, evidence path).
          Update the pressure-signals table with the new totals.
    acceptance_criteria:
      - id: "ac4_1"
        type: "documentation"
        description: "Catalog and cycle log both reference cycle 1."
        command: "bash -c 'n=$(grep -c dogfood-cycle-1-improve-skill docs/dogfood.md); [ \"$n\" -ge 2 ] && echo ok || echo fail'"
        expected: "ok"
        result: "pass"
        executed_at: "2026-04-20T11:21:50Z"
        result_output: "ok"
    status: "pending"

rollback:
  strategy: "per_phase"
  commands:
    phase1: "rm -rf .artifacts/dogfood-cycles/dogfood-cycle-1-improve-skill"
    phase2: "git -C ../runx checkout HEAD -- oss/skills/improve-skill && rm -f .artifacts/dogfood-cycles/dogfood-cycle-1-improve-skill/patch.diff"
    phase3: "rm -f .artifacts/dogfood-cycles/dogfood-cycle-1-improve-skill/cycle_metadata.json"
    phase4: "git checkout HEAD -- docs/dogfood.md"

