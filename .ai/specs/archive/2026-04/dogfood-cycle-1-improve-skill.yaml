task:
  title: "Dogfood cycle 1: improve improve-skill"
  summary: >
    First cycle of the aster dogfood campaign documented in
    docs/dogfood.md. The target skill is `improve-skill` itself —
    the composite skill that chains `receipt-review` into
    `harness-author`. Running improve-skill end-to-end on a real
    failing receipt calibrates the dogfood instrument before we
    use it on the rest of the catalog: if improve-skill is broken,
    every downstream cycle is compromised.

    A real failing receipt is picked from the existing aster
    dogfood bundle under `.artifacts/runx-dogfood/`. improve-skill
    is invoked through the runx CLI, the output is captured, the
    proposal is applied as a bounded change to
    `runx/oss/skills/improve-skill/` or its harness fixtures, the
    skill version is bumped, and the harness is re-run to confirm
    the improvement sticks. The cycle ends with a row in the
    catalog and a row in the pressure-signals table in
    docs/dogfood.md.

    Scope is intentionally bounded to one skill, one improvement,
    one version bump. Anything larger discovered during the cycle
    is recorded as a new draft spec, not landed here.
  size: "medium"
  risk_level: "low"
  context:
    packages:
      - "../runx/oss/skills/improve-skill"
      - "../runx/oss/skills/receipt-review"
      - "../runx/oss/skills/harness-author"
      - ".artifacts/runx-dogfood"
      - ".artifacts/dogfood-cycles"
      - "docs"
    files_impacted:
      - path: "../runx/oss/skills/improve-skill/SKILL.md"
        lines: "as-needed"
        reason: "Possible prompt or step-description edit surfaced by the diagnosis."
      - path: "../runx/oss/skills/improve-skill/X.yaml"
        lines: "as-needed"
        reason: "Possible harness fixture addition or chain-step wiring fix."
      - path: ".artifacts/dogfood-cycles/dogfood-cycle-1-improve-skill/"
        lines: "all"
        reason: "Per-cycle evidence bundle: objective, receipt, diagnosis, improvement, patch, cycle_metadata.json."
      - path: "docs/dogfood.md"
        lines: "as-needed"
        reason: "Catalog row, cycle log row, pressure-signals row."
    invariants:
      - "receipts_stay_canonical"
      - "bounded_improvement_per_cycle"
      - "version_bump_on_change"
      - "no_cycle_is_a_no_op"
    related_docs:
      - "docs/dogfood.md"
      - "../runx/oss/skills/improve-skill/SKILL.md"
      - "../runx/oss/skills/improve-skill/X.yaml"
      - "../runx/oss/skills/receipt-review/SKILL.md"
      - "../runx/oss/skills/harness-author/SKILL.md"
    cwd: "/home/kam/dev/aster"
  objectives:
    - "Run improve-skill via the runx CLI on a real failing receipt from .artifacts/runx-dogfood/."
    - "Capture receipt, diagnosis, and improvement artefacts under the cycle evidence folder."
    - "Apply at least one bounded improvement to improve-skill (SKILL.md, X.yaml, or a harness fixture) and bump its version."
    - "Verify the improvement via `runx harness runx/oss/skills/improve-skill`."
    - "Record the cycle in the catalog, cycle log, and pressure-signals table in docs/dogfood.md."
    - "Surface anything out-of-scope as a new draft spec rather than expanding this cycle."
  scope:
    in_scope:
      - "Invoking runx CLI on real receipts and on improve-skill itself"
      - "Editing improve-skill's SKILL.md, X.yaml, or harness fixtures"
      - "Writing cycle evidence under .artifacts/dogfood-cycles/"
      - "Bumping improve-skill's version"
      - "Updating docs/dogfood.md rows"
      - "Filing follow-up drafts for larger issues discovered"
    out_of_scope:
      - "Editing skills other than improve-skill"
      - "Changes to the runx execution kernel"
      - "Changes to aster hosted workflows or the thread-teaching stack"
      - "Opening external upstream PRs"
      - "Multi-cycle work (this spec is cycle 1 only)"
  dependencies:
    - "runx CLI globally linked and working (plain `runx` invocation)"
    - "Node/pnpm environment able to run runx and its skills"
    - "At least one real failing or suspicious receipt under `.artifacts/runx-dogfood/`"
  assumptions:
    - "improve-skill has an existing harness that can be re-run after a fixture or prompt edit."
    - "A bounded improvement can be found in one pass; if not, the cycle produces a `no_improvement_found` verdict and opens a follow-up draft instead."
    - "Semver bumps for skills are recorded either in SKILL.md frontmatter or in X.yaml metadata; whichever is current is what gets bumped."
  touchpoints:
    - area: "runx CLI"
      description: "Invoke improve-skill and the harness via the runx command-line."
      owners: ["aster", "runx"]
    - area: "skill change"
      description: "Land one bounded improvement to improve-skill."
      owners: ["aster"]
    - area: "evidence capture"
      description: "Per-cycle folder under .artifacts/dogfood-cycles/."
      owners: ["aster"]
    - area: "campaign doc"
      description: "docs/dogfood.md catalog, cycle log, and pressure rows."
      owners: ["aster"]
  risks:
    - description: "improve-skill runs succeed but produce vague or un-actionable proposals, making a bounded improvement impossible to land."
      impact: "medium"
      mitigation: "Record the verdict honestly as `no_improvement_found`, open a new draft spec capturing the failure mode, and end the cycle cleanly rather than forcing a change."
    - description: "Improvement scope creeps beyond one bounded change (e.g., rewriting the whole prompt)."
      impact: "medium"
      mitigation: "Non-goals list caps the scope. Any change larger than ~30 lines or touching more than two files spawns a new draft spec instead."
    - description: "Version bump conflicts with an independent runx change."
      impact: "low"
      mitigation: "Verify `git status` in runx before and after the edit; coordinate via branch if needed."
    - description: "Evidence folder gets committed with sensitive content (tokens in receipts)."
      impact: "medium"
      mitigation: "Review the bundle before commit; receipts should already be redacted by runx but confirm."
  acceptance:
    validation_profile: "standard"
    definition_of_done:
      - id: "dod1"
        description: "improve-skill was invoked via `runx improve-skill ...` on a real receipt and produced a diagnosis + proposal artefact."
        status: "pending"
      - id: "dod2"
        description: "A bounded improvement has been applied to improve-skill (or the cycle honestly recorded no_improvement_found with a follow-up draft)."
        status: "pending"
      - id: "dod3"
        description: "improve-skill's version has been bumped if any change landed."
        status: "pending"
      - id: "dod4"
        description: "The harness passes after the change: `runx harness runx/oss/skills/improve-skill` exits 0."
        status: "pending"
      - id: "dod5"
        description: "Per-cycle evidence folder contains objective.md, receipt.json, diagnosis.json, improvement.md, patch.diff, and cycle_metadata.json."
        status: "pending"
      - id: "dod6"
        description: "docs/dogfood.md has the cycle row, catalog row updated, and a pressure-signals row."
        status: "pending"
    validation:
      - id: "v1"
        type: "boundary"
        description: "Cycle evidence folder exists with all six required files."
        command: "bash -c 'd=.artifacts/dogfood-cycles/dogfood-cycle-1-improve-skill; for f in objective.md receipt.json diagnosis.json improvement.md patch.diff cycle_metadata.json; do [ -s \"$d/$f\" ] || { echo missing $f; exit 1; }; done; echo ok'"
        expected: "ok"
      - id: "v2"
        type: "test"
        description: "cycle_metadata.json records a recognised verdict."
        command: "bash -c 'v=$(jq -r .verdict .artifacts/dogfood-cycles/dogfood-cycle-1-improve-skill/cycle_metadata.json); case \"$v\" in needs_update|pass|fail|no_improvement_found) echo ok;; *) echo \"bad verdict: $v\"; exit 1;; esac'"
        expected: "ok"
      - id: "v3"
        type: "test"
        description: "improve-skill harness passes after any change."
        command: "bash -c 'cd ../runx && runx harness oss/skills/improve-skill --json > /tmp/imp-harness.json && s=$(jq -r .status /tmp/imp-harness.json); [ \"$s\" = success ] && echo ok || echo fail'"
        expected: "ok"
      - id: "v4"
        type: "documentation"
        description: "docs/dogfood.md contains a cycle row referencing dogfood-cycle-1-improve-skill."
        command: "grep -c dogfood-cycle-1-improve-skill docs/dogfood.md"
        expected: "at least 1"
      - id: "v5"
        type: "boundary"
        description: "If a change landed, improve-skill's declared version was bumped. If verdict is no_improvement_found, this check is skipped and the follow-up draft path is used instead."
        command: "bash -c 'v=$(jq -r .verdict .artifacts/dogfood-cycles/dogfood-cycle-1-improve-skill/cycle_metadata.json); if [ \"$v\" = no_improvement_found ]; then echo ok; else a=$(jq -r .version_before .artifacts/dogfood-cycles/dogfood-cycle-1-improve-skill/cycle_metadata.json); b=$(jq -r .version_after .artifacts/dogfood-cycles/dogfood-cycle-1-improve-skill/cycle_metadata.json); [ \"$a\" != \"$b\" ] && echo ok || { echo \"version not bumped: $a -> $b\"; exit 1; }; fi'"
        expected: "ok"
  constraints:
    approvals_required: []
    non_goals:
      - "No edits outside improve-skill and its harness"
      - "No runx execution-kernel changes"
      - "No aster workflow changes"
      - "No external PRs"
  info_sources:
    - "docs/dogfood.md"
    - "../runx/oss/skills/improve-skill/SKILL.md"
    - "../runx/oss/skills/improve-skill/X.yaml"
    - ".artifacts/runx-dogfood/"
  notes: >
    Cycle-1 scope choice: improve-skill itself is the dogfood instrument,
    so the first cycle calibrates it. If this cycle honestly returns
    no_improvement_found, that is still useful signal (it says the
    instrument is stable enough to trust on other skills) — in that
    case we record it, file a follow-up if any lesser issue was noticed,
    and move to cycle 2.

