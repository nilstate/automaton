task:
  title: "Dogfood cycle 4: improve skill-recon"
  summary: >
    Fourth cycle. Target: skill-recon (the "skill lab" equivalent in
    current runx naming). skill-recon's SKILL.md lists "prior art in
    runx" as priority 3 but the existing harness only covers the
    happy path where a new flow is proposed. Cycle 4 adds a
    harness case and SKILL.md guidance for the "recommend reuse"
    outcome: when decomposition references a skill that already
    exists, skill-recon should recommend reusing it rather than
    drafting new primitives.
  size: "medium"
  risk_level: "low"
  context:
    packages:
      - "../runx/oss/skills/skill-recon"
      - ".artifacts/dogfood-cycles"
      - "docs"
    files_impacted:
      - path: "../runx/oss/skills/skill-recon/SKILL.md"
        lines: "as-needed"
        reason: "Elevate 'recommend reuse' as a first-class output."
      - path: "../runx/oss/skills/skill-recon/X.yaml"
        lines: "as-needed"
        reason: "Add a recommend-reuse harness case."
      - path: ".artifacts/dogfood-cycles/dogfood-cycle-4-skill-recon/"
        lines: "all"
        reason: "Evidence bundle."
      - path: "docs/dogfood.md"
        lines: "as-needed"
        reason: "Catalog + cycle log + pressure rows."
    invariants:
      - "receipts_stay_canonical"
      - "bounded_improvement_per_cycle"
      - "no_cycle_is_a_no_op"
    related_docs:
      - "docs/dogfood.md"
      - "../runx/oss/skills/skill-recon/SKILL.md"
    cwd: "/home/kam/dev/aster"
  objectives:
    - "Clarify in skill-recon SKILL.md that recommending reuse is a first-class output."
    - "Add a harness case covering the recommend-reuse path."
    - "Verify harness stays green."
    - "Record in docs/dogfood.md."
  scope:
    in_scope:
      - "Editing skill-recon SKILL.md and X.yaml."
      - "Updating docs/dogfood.md."
    out_of_scope:
      - "Editing skills other than skill-recon."
      - "Kernel changes."
      - "External PRs."
  dependencies:
    - "Cycle 3 complete and pushed."
  assumptions:
    - "skill-recon's harness accepts a second case alongside the existing one."
  touchpoints:
    - area: "skill-recon"
      description: "One bounded SKILL.md + X.yaml change."
      owners: ["aster", "runx"]
    - area: "campaign"
      description: "docs/dogfood.md rows."
      owners: ["aster"]
  risks:
    - description: "Over-prescribing 'recommend reuse' could discourage legitimate new skill work."
      impact: "low"
      mitigation: "SKILL.md change is additive guidance; harness case is narrow."
  acceptance:
    validation_profile: "standard"
    definition_of_done:
      - id: "dod1"
        description: "Diagnosis captured."
        status: "pending"
      - id: "dod2"
        description: "SKILL.md elevates 'recommend reuse' as first-class output."
        status: "pending"
      - id: "dod3"
        description: "X.yaml has a recommend-reuse harness case."
        status: "pending"
      - id: "dod4"
        description: "skill-recon harness passes after the change."
        status: "pending"
      - id: "dod5"
        description: "Cycle evidence bundle complete."
        status: "pending"
      - id: "dod6"
        description: "docs/dogfood.md updated."
        status: "pending"
    validation:
      - id: "v1"
        type: "boundary"
        description: "Cycle evidence folder complete."
        command: "bash -c 'd=.artifacts/dogfood-cycles/dogfood-cycle-4-skill-recon; for f in objective.md receipt.json diagnosis.json improvement.md patch.diff cycle_metadata.json; do [ -s \"$d/$f\" ] || { echo missing $f; exit 1; }; done; echo ok'"
        expected: "ok"
      - id: "v2"
        type: "test"
        description: "skill-recon harness passes."
        command: "bash -c 'cd ../runx && runx harness oss/skills/skill-recon --json > /tmp/sr-harness.json && s=$(jq -r .status /tmp/sr-harness.json); [ \"$s\" = success ] && echo ok || echo fail'"
        expected: "ok"
      - id: "v3"
        type: "documentation"
        description: "docs/dogfood.md references cycle 4."
        command: "bash -c 'n=$(grep -c dogfood-cycle-4-skill-recon docs/dogfood.md); [ \"$n\" -ge 2 ] && echo ok || echo fail'"
        expected: "ok"
  constraints:
    approvals_required: []
    non_goals:
      - "No kernel changes"
      - "No external PRs"

