      - id: "v1"
        type: "boundary"
        description: "Cycle evidence folder has six required files."
        command: "bash -c 'd=.artifacts/dogfood-cycles/dogfood-cycle-2-receipt-review; for f in objective.md receipt.json diagnosis.json improvement.md patch.diff cycle_metadata.json; do [ -s \"$d/$f\" ] || { echo missing $f; exit 1; }; done; echo ok'"
        expected: "ok"
      - id: "v2"
        type: "test"
        description: "receipt-review harness succeeds."
        command: "bash -c 'cd ../runx && runx harness oss/skills/receipt-review --json > /tmp/rr-harness.json && s=$(jq -r .status /tmp/rr-harness.json); [ \"$s\" = success ] && echo ok || echo fail'"
        expected: "ok"
      - id: "v3"
        type: "documentation"
        description: "docs/dogfood.md references cycle 2."
        command: "bash -c 'n=$(grep -c dogfood-cycle-2-receipt-review docs/dogfood.md); [ \"$n\" -ge 2 ] && echo ok || echo fail'"
        expected: "ok"
