      - "Invoking runx CLI on receipt-review directly."
      - "Editing receipt-review's SKILL.md and X.yaml harness."
      - "Updating docs/dogfood.md."
    out_of_scope:
      - "Editing skills other than receipt-review."
      - "Changing chain wiring of improve-skill."
      - "Runx execution-kernel changes."
      - "External PRs."
  dependencies:
    - "Cycle 1 complete and committed to nilstate/runx main."
    - "runx CLI globally linked."
  assumptions:
    - "receipt-review's harness accepts an additional case alongside the existing one."
    - "A SKILL.md addition clarifying pause semantics is non-breaking."
  touchpoints:
    - area: "receipt-review"
      description: "One bounded SKILL.md + X.yaml change."
      owners: ["aster", "runx"]
    - area: "campaign"
      description: "docs/dogfood.md rows."
      owners: ["aster"]
  risks:
    - description: "Over-editing SKILL.md could change how the reviewer agent classifies real failures."
      impact: "medium"
      mitigation: "Additive paragraph only; do not rewrite the failure-class list."
    - description: "Cycle duplicates cycle 1 pattern with no unique value."
      impact: "low"
      mitigation: "Different file (SKILL.md), different level (component), different harness case — unique coverage."
