name: publish-public-evidence

on:
  workflow_run:
    workflows:
      - issue-supervisor
      - pr-triage
      - runx-dogfood
      - skill-learning
      - sourcey-refresh
    types:
      - completed
  workflow_dispatch:
    inputs:
      workflow_name:
        description: "Workflow name to report"
        required: true
        type: string
      status:
        description: "Conclusion status"
        required: true
        type: choice
        options:
          - success
          - failure
          - cancelled
      run_id:
        description: "Optional workflow run id"
        required: false
        type: string
      summary:
        description: "Optional summary"
        required: false
        type: string

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        github.event.workflow_run.conclusion == 'success' ||
        github.event.workflow_run.conclusion == 'failure' ||
        github.event.workflow_run.conclusion == 'cancelled' ||
        github.event.workflow_run.conclusion == 'timed_out'
      }}
    runs-on: ubuntu-latest
    steps:
      - name: Publish automaton evidence
        shell: bash
        env:
          RUNX_PUBLIC_EVIDENCE_API_BASE_URL: ${{ vars.RUNX_PUBLIC_EVIDENCE_API_BASE_URL || 'https://api.runx.ai' }}
          RUNX_PUBLIC_EVIDENCE_TOKEN: ${{ secrets.RUNX_PUBLIC_EVIDENCE_TOKEN }}
          RUNX_PUBLIC_EVIDENCE_KIND: automaton_run
          RUNX_PUBLIC_EVIDENCE_STATUS: ${{ github.event_name == 'workflow_dispatch' && inputs.status || (github.event.workflow_run.conclusion == 'timed_out' && 'failure') || github.event.workflow_run.conclusion }}
          RUNX_PUBLIC_EVIDENCE_TITLE: ${{ github.event_name == 'workflow_dispatch' && format('{0} · {1}', inputs.workflow_name, github.repository) || format('{0} · {1}', github.event.workflow_run.name, github.repository) }}
          RUNX_PUBLIC_EVIDENCE_SUMMARY: ${{ github.event_name == 'workflow_dispatch' && inputs.summary || format('workflow completed with status {0}', github.event_name == 'workflow_dispatch' && inputs.status || github.event.workflow_run.conclusion) }}
          RUNX_PUBLIC_EVIDENCE_REPO: ${{ github.repository }}
          RUNX_PUBLIC_EVIDENCE_WORKFLOW: ${{ github.event_name == 'workflow_dispatch' && inputs.workflow_name || github.event.workflow_run.name }}
          RUNX_PUBLIC_EVIDENCE_BRANCH: ${{ github.event_name == 'workflow_dispatch' && github.ref_name || github.event.workflow_run.head_branch }}
          RUNX_PUBLIC_EVIDENCE_COMMIT: ${{ github.event_name == 'workflow_dispatch' && github.sha || github.event.workflow_run.head_sha }}
          RUNX_PUBLIC_EVIDENCE_URL: ${{ github.event_name == 'workflow_dispatch' && format('{0}/{1}/actions/runs/{2}', github.server_url, github.repository, inputs.run_id || github.run_id) || github.event.workflow_run.html_url }}
          RUNX_PUBLIC_EVIDENCE_SOURCE: github-actions
          RUNX_PUBLIC_EVIDENCE_RUN_ID: ${{ github.event_name == 'workflow_dispatch' && inputs.run_id || github.event.workflow_run.id }}
        run: |
          set -euo pipefail

          [[ -n "${RUNX_PUBLIC_EVIDENCE_API_BASE_URL}" ]] || { echo "RUNX_PUBLIC_EVIDENCE_API_BASE_URL is required"; exit 1; }
          [[ -n "${RUNX_PUBLIC_EVIDENCE_TOKEN}" ]] || { echo "RUNX_PUBLIC_EVIDENCE_TOKEN is required"; exit 1; }

          python3 - <<'PY' > "$RUNNER_TEMP/runx-public-evidence.json"
          import json
          import os
          from datetime import datetime, timezone

          def trim(value: str | None) -> str | None:
              if value is None:
                  return None
              stripped = value.strip()
              return stripped or None

          github_run_url = None
          if trim(os.environ.get("GITHUB_SERVER_URL")) and trim(os.environ.get("GITHUB_REPOSITORY")) and trim(os.environ.get("GITHUB_RUN_ID")):
              github_run_url = f"{trim(os.environ['GITHUB_SERVER_URL'])}/{trim(os.environ['GITHUB_REPOSITORY'])}/actions/runs/{trim(os.environ['GITHUB_RUN_ID'])}"

          event = {
              "kind": trim(os.environ.get("RUNX_PUBLIC_EVIDENCE_KIND")) or "automaton_run",
              "source": trim(os.environ.get("RUNX_PUBLIC_EVIDENCE_SOURCE")) or "github-actions",
              "status": trim(os.environ.get("RUNX_PUBLIC_EVIDENCE_STATUS")) or "success",
              "title": trim(os.environ.get("RUNX_PUBLIC_EVIDENCE_TITLE")) or "automaton public event",
              "timestamp": trim(os.environ.get("RUNX_PUBLIC_EVIDENCE_TIMESTAMP")) or datetime.now(timezone.utc).isoformat().replace("+00:00", "Z"),
              "summary": trim(os.environ.get("RUNX_PUBLIC_EVIDENCE_SUMMARY")),
              "repo": trim(os.environ.get("RUNX_PUBLIC_EVIDENCE_REPO")) or trim(os.environ.get("GITHUB_REPOSITORY")),
              "workflow": trim(os.environ.get("RUNX_PUBLIC_EVIDENCE_WORKFLOW")) or trim(os.environ.get("GITHUB_WORKFLOW")),
              "branch": trim(os.environ.get("RUNX_PUBLIC_EVIDENCE_BRANCH")) or trim(os.environ.get("GITHUB_REF_NAME")),
              "commit": trim(os.environ.get("RUNX_PUBLIC_EVIDENCE_COMMIT")) or trim(os.environ.get("GITHUB_SHA")),
              "run_id": trim(os.environ.get("RUNX_PUBLIC_EVIDENCE_RUN_ID")),
              "url": trim(os.environ.get("RUNX_PUBLIC_EVIDENCE_URL")) or github_run_url,
              "metadata": {
                  "github_run_id": trim(os.environ.get("GITHUB_RUN_ID")),
                  "github_run_attempt": trim(os.environ.get("GITHUB_RUN_ATTEMPT")),
                  "github_job": trim(os.environ.get("GITHUB_JOB")),
              },
          }
          print(json.dumps({"events": [event]}))
          PY

          curl --fail --silent --show-error \
            -X POST \
            -H "authorization: Bearer ${RUNX_PUBLIC_EVIDENCE_TOKEN}" \
            -H "content-type: application/json" \
            --data @"$RUNNER_TEMP/runx-public-evidence.json" \
            "${RUNX_PUBLIC_EVIDENCE_API_BASE_URL%/}/v1/admin/public/evidence"
